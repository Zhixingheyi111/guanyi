<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>观易 · PWA 图标生成器</title>
  <style>
    body {
      background: #1a1a1a;
      color: #eee;
      font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 2rem;
    }
    h1 {
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-top: 0;
    }
    .config {
      background: #111;
      padding: 1rem 1.25rem;
      border-radius: 6px;
      margin-bottom: 2rem;
      max-width: 640px;
    }
    .config label {
      display: inline-block;
      margin-right: 1rem;
      font-size: 0.85rem;
      color: #bbb;
    }
    .config input {
      width: 5.5rem;
      background: #000;
      color: #fff;
      border: 1px solid #444;
      padding: 0.25rem 0.4rem;
      border-radius: 3px;
      font-family: inherit;
    }
    .config button {
      margin-top: 0.6rem;
      padding: 0.4rem 1rem;
      background: #444;
      color: #eee;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .card {
      background: #0e0e0e;
      border: 1px solid #222;
      padding: 1rem;
      border-radius: 6px;
      text-align: center;
    }
    .card .label {
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }
    .card canvas {
      display: block;
      margin: 0 auto;
    }
    .card .download {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.45rem 1rem;
      background: #d4a24c;
      color: #000;
      border: none;
      border-radius: 3px;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: inherit;
    }
    .hint {
      color: #888;
      font-size: 0.85rem;
      margin-top: 2rem;
      line-height: 1.9;
      max-width: 640px;
    }
    code {
      background: #000;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      color: #d4a24c;
    }
  </style>
</head>
<body>
  <h1>观易 · PWA 图标生成</h1>

  <div class="config">
    <div style="margin-bottom: 0.6rem;">
      <label>背景色 <input id="bg" type="text" value="#000000" /></label>
      <label>文字色 <input id="fg" type="text" value="#ffffff" /></label>
      <label>文字 <input id="text" type="text" value="观易" style="width: 6rem;" /></label>
    </div>
    <div style="margin-bottom: 0.6rem;">
      <label>字体 <input id="font" type="text" value='"Songti SC", "STSong", "SimSun", serif' style="width: 16rem;" /></label>
    </div>
    <div>
      <label>字号比例 <input id="ratio" type="number" step="0.01" value="0.42" /></label>
      <label>字距 em <input id="spacing" type="number" step="0.01" value="0.05" /></label>
      <label>粗细 <input id="weight" type="text" value="500" /></label>
    </div>
    <button id="redraw">重新绘制</button>
  </div>

  <div class="row" id="grid"></div>

  <p class="hint">
    点击每张图标下的<strong>下载 PNG</strong>按钮依次保存。<br>
    保存到项目 <code>public/</code> 目录，文件名保持默认：<br>
    &nbsp;&nbsp;<code>icon-192.png</code>　<code>icon-512.png</code>　<code>apple-touch-icon.png</code>
  </p>

  <script>
    const SIZES = [
      { px: 192, filename: 'icon-192.png' },
      { px: 512, filename: 'icon-512.png' },
      { px: 180, filename: 'apple-touch-icon.png' },
    ];

    function readConfig() {
      return {
        bg:        document.getElementById('bg').value,
        fg:        document.getElementById('fg').value,
        text:      document.getElementById('text').value,
        font:      document.getElementById('font').value,
        ratio:     parseFloat(document.getElementById('ratio').value),
        spacing:   parseFloat(document.getElementById('spacing').value),
        weight:    document.getElementById('weight').value,
      };
    }

    function draw(canvas, size, cfg) {
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      // 背景
      ctx.fillStyle = cfg.bg;
      ctx.fillRect(0, 0, size, size);
      // 文字
      const fontSize = size * cfg.ratio;
      ctx.fillStyle    = cfg.fg;
      ctx.font         = `${cfg.weight} ${fontSize}px ${cfg.font}`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      // 手写字距
      const chars = [...cfg.text];
      const spacing = fontSize * cfg.spacing;
      const widths = chars.map(c => ctx.measureText(c).width);
      const total  = widths.reduce((a,b)=>a+b, 0) + spacing * (chars.length - 1);
      let x = (size - total) / 2;
      for (let i = 0; i < chars.length; i++) {
        ctx.fillText(chars[i], x + widths[i]/2, size/2);
        x += widths[i] + spacing;
      }
    }

    function download(canvas, filename) {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    const grid = document.getElementById('grid');
    const cards = [];

    SIZES.forEach(({ px, filename }) => {
      const card = document.createElement('div');
      card.className = 'card';
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = `${px} × ${px}`;
      const canvas = document.createElement('canvas');
      const displayPx = Math.min(px, 240);
      canvas.style.width  = displayPx + 'px';
      canvas.style.height = displayPx + 'px';
      const btn = document.createElement('button');
      btn.className = 'download';
      btn.textContent = `下载 ${filename}`;
      btn.onclick = () => download(canvas, filename);
      card.appendChild(label);
      card.appendChild(canvas);
      card.appendChild(btn);
      grid.appendChild(card);
      cards.push({ canvas, px });
    });

    function redrawAll() {
      const cfg = readConfig();
      cards.forEach(({ canvas, px }) => draw(canvas, px, cfg));
    }

    document.getElementById('redraw').addEventListener('click', redrawAll);
    // 初次绘制（等字体加载，避免中文字体尚未就绪时渲染成 fallback）
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(redrawAll);
    } else {
      redrawAll();
    }
  </script>
</body>
</html>
