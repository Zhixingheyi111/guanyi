<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="观易 · 见自己" />
    <meta name="theme-color" content="#F5F1E8" />

    <!-- PWA 可安装配置 -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS 添加到主屏幕后的全屏展示 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="观易" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- 字体策略：优先用系统字体（Songti SC/SimSun 即 iOS/Mac/Win 自带宋体，立即可用）。
         Google Fonts 的思源宋体作为渐进增强——加载成功则升级，被墙则无感降级。
         使用 media="print" + onload 让 CSS 异步加载，不阻塞首屏。 -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap"
      media="print"
      onload="this.media='all'" />

    <title>观易 · 见自己</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
